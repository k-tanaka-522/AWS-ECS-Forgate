services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: ${CONTAINER_IMAGE:-escforgate-app}
    ports:
      - "${CONTAINER_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DEBUG=express:*
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      # WordPress環境変数
      - WORDPRESS_DB_NAME=${DB_NAME:-escforgate}
      - WORDPRESS_DB_USER=${DB_USER:-admin}
      - WORDPRESS_DB_PASSWORD=${DB_PASSWORD:-localpassword}
      - WORDPRESS_DB_HOST=${DB_HOST:-db}
      - WORDPRESS_DEBUG=${WORDPRESS_DEBUG:-true}
      - WORDPRESS_SITEURL=${WORDPRESS_SITEURL:-http://localhost:3000}
      - WORDPRESS_HOME=${WORDPRESS_HOME:-http://localhost:3000}
      # WordPress認証キーと秘密鍵
      - WORDPRESS_AUTH_KEY=${WORDPRESS_AUTH_KEY:-'put your unique phrase here'}
      - WORDPRESS_SECURE_AUTH_KEY=${WORDPRESS_SECURE_AUTH_KEY:-'put your unique phrase here'}
      - WORDPRESS_LOGGED_IN_KEY=${WORDPRESS_LOGGED_IN_KEY:-'put your unique phrase here'}
      - WORDPRESS_NONCE_KEY=${WORDPRESS_NONCE_KEY:-'put your unique phrase here'}
      - WORDPRESS_AUTH_SALT=${WORDPRESS_AUTH_SALT:-'put your unique phrase here'}
      - WORDPRESS_SECURE_AUTH_SALT=${WORDPRESS_SECURE_AUTH_SALT:-'put your unique phrase here'}
      - WORDPRESS_LOGGED_IN_SALT=${WORDPRESS_LOGGED_IN_SALT:-'put your unique phrase here'}
      - WORDPRESS_NONCE_SALT=${WORDPRESS_NONCE_SALT:-'put your unique phrase here'}
      # ローカル開発時はMySQLコンテナに接続
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-escforgate}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-localpassword}
      # AWS認証情報（開発環境用）
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # ECSタスクロールを使用する場合は不要（プロダクション環境では削除）
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy

  # ローカル開発用MySQLコンテナ（本番環境ではRDSを使用）
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME:-escforgate}
      - MYSQL_USER=${DB_USER:-admin}
      - MYSQL_PASSWORD=${DB_PASSWORD:-localpassword}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
