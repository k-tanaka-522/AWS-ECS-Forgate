AWSTemplateFormatVersion: '2010-09-09'
Description: 'Database stack for ESCForgate - RDS MySQL'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - stg
      - prd
    Description: Target environment for the stack

  DBInstanceClass:
    Type: String
    Default: db.t3.small
    Description: Database instance class

  DBName:
    Type: String
    Default: escforgate
    Description: Database name

  DBUsername:
    Type: String
    Default: admin
    Description: Database admin username

  DBPassword:
    Type: String
    NoEcho: true
    Description: Database admin password

Resources:
  # DB Subnet Group
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for ESCForgate RDS
      SubnetIds:
        - Fn::ImportValue: !Sub ${Environment}-escforgate-private-subnet-1
        - Fn::ImportValue: !Sub ${Environment}-escforgate-private-subnet-2
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-escforgate-db-subnet-group

  # DB Parameter Group
  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: mysql8.0
      Description: Parameter group for ESCForgate RDS
      Parameters:
        character_set_client: utf8mb4
        character_set_connection: utf8mb4
        character_set_database: utf8mb4
        character_set_filesystem: utf8mb4
        character_set_results: utf8mb4
        character_set_server: utf8mb4
        collation_connection: utf8mb4_unicode_ci
        collation_server: utf8mb4_unicode_ci
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-escforgate-db-parameter-group

  # RDS Instance
  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      Engine: mysql
      EngineVersion: 8.0.35
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: 20
      StorageType: gp3
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      VPCSecurityGroups:
        - Fn::ImportValue: !Sub ${Environment}-escforgate-rds-sg
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: false
      MultiAZ: true
      BackupRetentionPeriod: 7
      DeletionProtection: true
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-escforgate-rds

  # Secrets Manager for DB credentials
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${Environment}/escforgate/db-credentials
      Description: RDS database credentials
      SecretString: !Sub '{"username":"${DBUsername}","password":"${DBPassword}","engine":"mysql","host":"${RDSInstance.Endpoint.Address}","port":3306,"dbname":"${DBName}"}'
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-escforgate-db-secret

Outputs:
  RDSEndpoint:
    Description: RDS endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub ${Environment}-escforgate-rds-endpoint

  RDSPort:
    Description: RDS port
    Value: !GetAtt RDSInstance.Endpoint.Port
    Export:
      Name: !Sub ${Environment}-escforgate-rds-port

  DBSecretArn:
    Description: Database credentials secret ARN
    Value: !Ref DBSecret
    Export:
      Name: !Sub ${Environment}-escforgate-db-secret-arn
