AWSTemplateFormatVersion: '2010-09-09'
Description: 'Compute stack for ESCForgate - ECS Fargate and ALB'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - stg
      - prd
    Description: Target environment for the stack

  DBName:
    Type: String
    Default: wordpress
    Description: Database name for WordPress

  DBUsername:
    Type: String
    Default: wordpress
    Description: Database username for WordPress

  ContainerImage:
    Type: String
    Description: Docker image for the application container

  ContainerPort:
    Type: Number
    Default: 3000
    Description: Port number the application listens on

  DesiredCount:
    Type: Number
    Default: 2
    Description: Desired number of containers to run

  TaskCpu:
    Type: Number
    Default: 256
    Description: CPU units for the task (1 vCPU = 1024)

  TaskMemory:
    Type: Number
    Default: 512
    Description: Memory (MB) for the task

Resources:
  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${Environment}-escforgate-cluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-escforgate-cluster

  # ECS Task Execution Role
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - Fn::ImportValue: !Sub ${Environment}-escforgate-db-secret-arn

  # ECS Task Role
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:*
                Resource: '*'

  # Task Definition
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${Environment}-escforgate-task
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        OperatingSystemFamily: LINUX
        CpuArchitecture: X86_64
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ContainerImage
          PortMappings:
            - ContainerPort: !Ref ContainerPort
          Environment:
            - Name: WORDPRESS_DB_NAME
              Value: !Ref DBName
            - Name: WORDPRESS_DB_USER
              Value: !Ref DBUsername
            - Name: WORDPRESS_DEBUG
              Value: "true"
            - Name: WORDPRESS_SITEURL
              Value: !Sub https://${Environment}.tk-niigata.com
            - Name: WORDPRESS_HOME
              Value: !Sub https://${Environment}.tk-niigata.com
            - Name: WORDPRESS_AUTH_KEY
              Value: !Sub '${Environment}-auth-key-${AWS::Region}'
            - Name: WORDPRESS_SECURE_AUTH_KEY
              Value: !Sub '${Environment}-secure-auth-key-${AWS::Region}'
            - Name: WORDPRESS_LOGGED_IN_KEY
              Value: !Sub '${Environment}-logged-in-key-${AWS::Region}'
            - Name: WORDPRESS_NONCE_KEY
              Value: !Sub '${Environment}-nonce-key-${AWS::Region}'
            - Name: WORDPRESS_AUTH_SALT
              Value: !Sub '${Environment}-auth-salt-${AWS::Region}'
            - Name: WORDPRESS_SECURE_AUTH_SALT
              Value: !Sub '${Environment}-secure-auth-salt-${AWS::Region}'
            - Name: WORDPRESS_LOGGED_IN_SALT
              Value: !Sub '${Environment}-logged-in-salt-${AWS::Region}'
            - Name: WORDPRESS_NONCE_SALT
              Value: !Sub '${Environment}-nonce-salt-${AWS::Region}'
          Secrets:
            - Name: WORDPRESS_DB_PASSWORD
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Environment}/wordpress/db-password
            - Name: WORDPRESS_DB_HOST
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Environment}/wordpress/db-host
            - Name: COGNITO_USER_POOL_ID
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Environment}/wordpress/cognito-pool-id
            - Name: COGNITO_CLIENT_ID
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Environment}/wordpress/cognito-client-id
            - Name: AWS_ACCESS_KEY_ID
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Environment}/wordpress/aws-access-key
            - Name: AWS_SECRET_ACCESS_KEY
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Environment}/wordpress/aws-secret-key
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # CloudWatch Logs
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${Environment}-escforgate
      RetentionInDays: 14

  # Application Load Balancer
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${Environment}-escforgate-alb
      Scheme: internet-facing
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '60'
      Subnets:
        - Fn::ImportValue: !Sub ${Environment}-escforgate-public-subnet-1
        - Fn::ImportValue: !Sub ${Environment}-escforgate-public-subnet-2
      SecurityGroups:
        - Fn::ImportValue: !Sub ${Environment}-escforgate-alb-sg

  # ALB Target Group
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${Environment}-escforgate-tg
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId:
        Fn::ImportValue: !Sub ${Environment}-escforgate-vpc-id
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # ACM Certificate
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: dev.tk-niigata.com
      ValidationMethod: DNS
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-escforgate-cert

  # ALB HTTPS Listener
  ListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref Certificate
      SslPolicy: ELBSecurityPolicy-2016-08
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ALB HTTP Listener (Redirect to HTTPS)
  ListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            Host: "#{host}"
            Path: "/#{path}"
            Query: "#{query}"
            StatusCode: HTTP_301

  # ECS Service
  Service:
    Type: AWS::ECS::Service
    DependsOn: ListenerHTTPS
    Properties:
      ServiceName: !Sub ${Environment}-escforgate-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - Fn::ImportValue: !Sub ${Environment}-escforgate-ecs-sg
          Subnets:
            - Fn::ImportValue: !Sub ${Environment}-escforgate-private-subnet-1
            - Fn::ImportValue: !Sub ${Environment}-escforgate-private-subnet-2
      LoadBalancers:
        - ContainerName: app
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      EnableExecuteCommand: true

  # Auto Scaling
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 4
      MinCapacity: 1
      ResourceId: !Join
        - /
        - - service
          - !Ref ECSCluster
          - !GetAtt Service.Name
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${Environment}-escforgate-cpu-scaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 300

Outputs:
  LoadBalancerDNS:
    Description: Load Balancer DNS Name
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub ${Environment}-escforgate-alb-dns

  ServiceName:
    Description: ECS Service Name
    Value: !GetAtt Service.Name
    Export:
      Name: !Sub ${Environment}-escforgate-service-name

  ClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${Environment}-escforgate-cluster-name
