spring:
  datasource:
    url: jdbc:postgresql://${host}:${port}/${dbname}
    # username/passwordはSecrets Managerから取得
  jpa:
    hibernate:
      ddl-auto: none  # 本番環境では自動スキーマ更新を無効化
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

logging:
  level:
    com.example.ecsforgate: WARN
    org.hibernate.SQL: ERROR
    # 本番環境でのロギングを最小限に

management:
  endpoints:
    web:
      exposure:
        include: health,info  # 本番環境では最低限のエンドポイントのみ公開
  endpoint:
    health:
      show-details: never  # 本番環境では詳細情報を非公開
