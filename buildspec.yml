version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto11
    commands:
      - echo Installing dependencies...
      - apt-get update -y
      - apt-get install -y curl jq
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/ecsforgate-api
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo Checking for Secrets Manager secrets...
      - aws secretsmanager list-secrets --query "SecretList[?starts_with(Name, 'ecsforgate/${ENVIRONMENT}/')].Name" --output text
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Java application...
      - cd app/api
      - ./gradlew clean build
      - echo Building the Docker image...
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG -t $REPOSITORY_URI:latest .
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Running tests...
      - cd app/api
      - ./gradlew test
      - echo Pushing the Docker image...
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo Writing artifacts...
      - cd $CODEBUILD_SRC_DIR
      - aws cloudformation package --template-file iac/cloudformation/templates/ecs.yaml --s3-bucket $ARTIFACT_BUCKET --s3-prefix $ENVIRONMENT --output-template-file ecs-packaged.yaml
      - sed -i "s|<IMAGE_URI>|$REPOSITORY_URI:$IMAGE_TAG|g" taskdef.json
      - echo Writing container definition file...
      - echo '{"containerDefinitions":[{"name":"api-container","image":"'$REPOSITORY_URI:$IMAGE_TAG'","essential":true,"portMappings":[{"hostPort":8080,"containerPort":8080,"protocol":"tcp"}],"environment":[{"name":"SPRING_PROFILES_ACTIVE","value":"'${ENVIRONMENT}'"}],"logConfiguration":{"logDriver":"awslogs","options":{"awslogs-group":"/ecs/ecsforgate-api-'${ENVIRONMENT}'","awslogs-region":"'${AWS_DEFAULT_REGION}'","awslogs-stream-prefix":"ecs"}}}]}' > container-definition.json

artifacts:
  files:
    - appspec.yml
    - taskdef.json
    - ecs-packaged.yaml
    - container-definition.json
    - iac/cloudformation/config/$ENVIRONMENT/parameters.json
  discard-paths: no

cache:
  paths:
    - '/root/.gradle/caches/**/*'
    - '/root/.gradle/wrapper/**/*'
